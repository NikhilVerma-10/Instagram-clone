<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://th.bing.com/th/id/OIP.WE109lmuCjsw8asJparTPgHaHa?w=186&h=186&c=7&r=0&o=5&dpr=1.3&pid=1.7" type="image">
    <title>Instagram-signup-page</title>
    <link rel="stylesheet" href="instagram_signup_page.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <img src="https://th.bing.com/th/id/OIP.w5k2BH5RGRjCQwefhfl5owHaCp?rs=1&pid=ImgDetMain"/>

            <p>Sign up to see photos and videos form your friends.</p>

            <button>
               Log in with Facebook
            </button>

            <div class="seperator">
                <span></span>
                <span>OR</span>
                <span></span>
            </div>

            <form action="#" class="form">
               <div class="input">
                  <label for="#">
                      <input type="email">
                      <span>Mobile Number or Email</span>
                  </label>
                  <label for="#">
                      <input type="name">
                      <span>Full Name</span>
                  </label>
                  <label for="#">
                    <input type="name">
                    <span>Username</span>
                </label>
                <label for="#">
                    <input type="password">
                    <span>Password</span>
                </label>

                <div class="policy">
                    <p>People who use our service may have uploaded your contact information to Instagram. <a href="https://www.facebook.com/help/637205020878504" target="_blank">Learn more</a></p>
                    <p>By signing up, you agree to our <a href="https://www.facebook.com/privacy/policy/?entry_point=data_policy_redirect&entry=0" target="_blank">Terms, Privacy Policy and Cookies Policy</a></p>
                </div>
                </div>
              <button>Sign up</button>
            </form>
        </div>
    </div>
    <div class="log-in">
        <p>Have an account ? <a href="https://www.instagram.com/accounts/emailsignup/" target="_blank">Log in</a></p>
    </div>
</body>
</html>
