<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://th.bing.com/th/id/OIP.A_QLZ7Y9nBwaWnkhCbvGmQHaHZ?w=182&h=181&c=7&r=0&o=5&dpr=1.3&pid=1.7" type="image">
    <title>Instagram-login-page</title>
    <link rel="stylesheet" href="instagram_login_page.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <img src="https://th.bing.com/th/id/OIP.w5k2BH5RGRjCQwefhfl5owHaCp?rs=1&pid=ImgDetMain"/>

            <form action="#" class="form">
               <div class="input">
                  <label for="#">
                      <input type="text">
                      <span>Phone number, username, or email</span>
                  </label>
                  <label for="#">
                      <input type="password">
                      <span>Password</span>
                  </label>
              </div>
              <button>Login in</button>
            </form>
            <div class="seperator">
                <span></span>
                <span>OR</span>
                <span></span>
            </div>
            <div class="forget-button">
                <button>
                    <img src="https://images.vexels.com/media/users/3/223136/isolated/preview/984f500cf9de4519b02b354346eb72e0-facebook-icon-social-media-by-vexels.png"/>
                    <span><a href="instagram_signup_page.html">Log in with facebook</a></span>
                </button>
                <button>Forget password ?</button>
            </div>
        </div>
    </div>
    <div class="sign-up">
        <p>Don't have an account ? <a href="https://www.instagram.com/accounts/emailsignup/" target="_blank">Sign-up</a></p>
    </div>
    
</body>
</html>
